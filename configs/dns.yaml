# ============================================================
# DNS 查询探测配置
# ============================================================

# 探测目标列表
targets:
    # 查询的域名
  - domain: "example.com"

    # DNS 服务器地址 (IP:port, 默认端口 53)
    server: "8.8.8.8"

    # 记录类型: A / AAAA / MX / NS / CNAME / TXT
    record_type: "A"

    # 探测间隔
    interval: 60s

    # 查询超时
    timeout: 10s

    # 附加标签
    labels:
      service: example-dns

  - domain: "example.com"
    server: "114.114.114.114"
    record_type: "A"
    interval: 60s

  - domain: "mail.example.com"
    server: "8.8.8.8"
    record_type: "MX"
    interval: 120s
