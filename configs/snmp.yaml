defaults:
  version: 2c
  community: "public"
  port: 161
  timeout: 5s
  retries: 1

targets:
  - host: "192.168.1.1"
    interval: 60s
    labels:
      device: core-router
      site: main
    oids:
      scalar:
        - "1.3.6.1.2.1.1.1.0"
        - "1.3.6.1.2.1.1.3.0"
      tables:
        - oid: "1.3.6.1.2.1.2.2.1"
          index: ifIndex
          tag: ifDescr
          metrics:
            - oid: "1.3.6.1.2.1.2.2.1.10"
              name: if_in_octets
              type: counter
            - oid: "1.3.6.1.2.1.2.2.1.16"
              name: if_out_octets
              type: counter

  - host: "192.168.1.2"
    timeout: 10s
    labels:
      device: access-switch
      site: branch-a
    oids:
      scalar:
        - "1.3.6.1.2.1.1.1.0"
