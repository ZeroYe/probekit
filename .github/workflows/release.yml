name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          check-latest: true

      - name: Build all platforms
        working-directory: ${{ github.workspace }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          LDFLAGS="-X github.com/ZeroYe/probekit/internal/selfmetrics.BuildVersion=${VERSION}"

          mkdir -p dist

          GOOS=linux   GOARCH=amd64 go build -ldflags "$LDFLAGS" -o "dist/probekit-linux-amd64-${GITHUB_REF_NAME}"  ./cmd/probekit/
          GOOS=linux   GOARCH=arm64 go build -ldflags "$LDFLAGS" -o "dist/probekit-linux-arm64-${GITHUB_REF_NAME}"  ./cmd/probekit/
          GOOS=windows GOARCH=amd64 go build -ldflags "$LDFLAGS" -o "dist/probekit-windows-amd64-${GITHUB_REF_NAME}.exe" ./cmd/probekit/

      - name: Create archives
        working-directory: ${{ github.workspace }}/dist
        run: |
          for f in probekit-*; do
            ext="${f##*.}"
            if [ "$ext" = "exe" ]; then
              zip "${f%.exe}.zip" "$f"
            else
              gzip -k "$f"
            fi
          done

      - name: Generate checksums
        working-directory: ${{ github.workspace }}/dist
        run: |
          sha256sum probekit-* > checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "probekit ${{ github.ref_name }}"
          body: |
            ## probekit ${{ github.ref_name }}

            ### Downloads

            | File | Platform |
            |------|----------|
            | `probekit-linux-amd64-${{ github.ref_name }}` | Linux x86_64 |
            | `probekit-linux-arm64-${{ github.ref_name }}` | Linux ARM64 |
            | `probekit-windows-amd64-${{ github.ref_name }}.exe` | Windows x86_64 |

            `checksums.txt` — SHA256 of all files above.
          files: dist/*
