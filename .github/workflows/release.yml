name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "版本号 (如 v1.0.0)"
        required: false
        default: "dev-build"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          check-latest: true

      - name: Build binaries
        working-directory: ${{ github.workspace }}
        run: |
          VERSION="${{ github.event.inputs.version || github.ref_name }}"
          VERSION="${VERSION#v}"
          LDFLAGS="-X github.com/ZeroYe/probekit/internal/selfmetrics.BuildVersion=${VERSION}"

          mkdir -p dist/release

          GOOS=linux   GOARCH=amd64 go build -ldflags "$LDFLAGS" -o "dist/release/linux-amd64/probekit"  ./cmd/probekit/
          GOOS=linux   GOARCH=arm64 go build -ldflags "$LDFLAGS" -o "dist/release/linux-arm64/probekit"  ./cmd/probekit/
          GOOS=windows GOARCH=amd64 go build -ldflags "$LDFLAGS" -o "dist/release/windows-amd64/probekit.exe" ./cmd/probekit/

      - name: Package archives
        working-directory: ${{ github.workspace }}/dist/release
        run: |
          TAG="${{ github.event.inputs.version || github.ref_name }}"

          for platform in linux-amd64 linux-arm64 windows-amd64; do
            # 拷贝示例配置到各平台目录
            cp -r "${{ github.workspace }}/configs" "$platform/configs"
          done

          # Linux: tar.gz
          tar -czf "probekit-${TAG}-linux-amd64.tar.gz"  -C linux-amd64  probekit configs
          tar -czf "probekit-${TAG}-linux-arm64.tar.gz"  -C linux-arm64  probekit configs

          # Windows: zip
          cd windows-amd64 && zip -r "../probekit-${TAG}-windows-amd64.zip" probekit.exe configs && cd ..

          # 清理临时目录
          rm -rf linux-amd64 linux-arm64 windows-amd64

      - name: Generate checksums
        working-directory: ${{ github.workspace }}/dist/release
        run: |
          sha256sum probekit-* > checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "probekit ${{ github.event.inputs.version || github.ref_name }}"
          tag_name: ${{ github.event.inputs.version || github.ref_name }}
          body: |
            ## probekit ${{ github.event.inputs.version || github.ref_name }}

            ### 下载

            | 文件 | 平台 |
            |------|------|
            | `probekit-${{ github.event.inputs.version || github.ref_name }}-linux-amd64.tar.gz` | Linux x86_64 |
            | `probekit-${{ github.event.inputs.version || github.ref_name }}-linux-arm64.tar.gz` | Linux ARM64 |
            | `probekit-${{ github.event.inputs.version || github.ref_name }}-windows-amd64.zip` | Windows x86_64 |

            > 压缩包内包含 `probekit` (或 `probekit.exe`) 可执行文件和 `configs/` 示例配置目录。

            `checksums.txt` — 以上所有文件的 SHA256 校验和。
          files: dist/release/*
